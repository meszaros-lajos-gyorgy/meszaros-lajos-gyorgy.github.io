<body>
	<div ng-app="Monochord" ng-controller="MonochordCtrl as mctrl">
		<br />
		<br />
		<br />
		
		<label class="input">
			<span class="left">Base Frequency</span>
			<span class="right editor"><input type="number" min="0" max="10000" ng-model="baseFrequency" onfocus="this.parentNode.classList.add('active');var val = parseInt(this.value);this.parentNode.classList[val > parseInt(this.getAttribute('max')) || val < parseInt(this.getAttribute('min')) ? 'add' : 'remove']('invalid')" onblur="this.parentNode.classList.remove('active')" oninput="var val = parseInt(this.value);this.parentNode.classList[val > parseInt(this.getAttribute('max')) || val < parseInt(this.getAttribute('min')) ? 'add' : 'remove']('invalid')" />Hz</span>
		</label>
	</div>
